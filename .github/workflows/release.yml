name: Build, Test and Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-test-release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        shell: powershell
        run: |
          nuget restore .\example_unit.sln

      - name: Build solution (Release x64)
        shell: powershell
        run: |
          msbuild .\example_unit.sln `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /m

      - name: Find VSTest
        id: vstest
        shell: powershell
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vstest = & $vswhere -latest -products * -find "Common7\IDE\CommonExtensions\Microsoft\TestWindow\vstest.console.exe" | Select-Object -First 1

          if (-not $vstest) {
            throw "vstest.console.exe not found"
          }

          "path=$vstest" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Find test dll
        id: testdll
        shell: powershell
        run: |
          $dll = Get-ChildItem -Recurse -Filter TEST.dll | Select-Object -First 1

          if (-not $dll) {
            throw "TEST.dll not found after build"
          }

          "path=$($dll.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Run tests
        shell: powershell
        run: |
          & "${{ steps.vstest.outputs.path }}" "${{ steps.testdll.outputs.path }}"

      - name: Collect release files
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null

          Get-ChildItem -Recurse -Include *.exe,*.dll,*.lib |
            Where-Object { $_.FullName -notmatch "\\TEST\\" } |
            Copy-Item -Destination .\release -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-files
          path: release\*

      - name: Create GitHub Release
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" .\release\* `
            --title "${{ github.ref_name }}" `
            --notes "Automatic release for ${{ github.ref_name }}"
